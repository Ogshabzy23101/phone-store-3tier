name: ssh into ec2 and run docker compose file
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and run docker compose
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }} # @security: EC2_HOST secret required
          username: ${{ secrets.EC2_USER }} # @security: EC2_USER secret required
          key: ${{ secrets.EC2_SSH_KEY }} # @security: EC2_SSH_KEY secret required
          script: |
            cd /home/ubuntu/web
            docker compose down
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
