services:
  db:
    image: postgres:15
    container_name: phonestore_db
    environment:
      POSTGRES_USER: phonestore_admin
      POSTGRES_PASSWORD: phonestore_password
      POSTGRES_DB: phonestore_db
    ports:
      - "5432:5432"
    volumes:
      - phonestore_db_data:/var/lib/postgresql/data

  backend:
    build:
      context: ../../backend
    container_name: phonestore_backend
    environment:
      PORT: "5000"
      DATABASE_URL: postgres://phonestore_admin:phonestore_password@db:5432/phonestore_db
    ports:
      - "5001:5000"
    depends_on:
      - db

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile.dev
    container_name: phonestore_frontend
    environment:
      - VITE_API_BASE_URL=http://backend:5001
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ../../frontend:/app
      - /app/node_modules

volumes:
  phonestore_db_data:

networks:
  default:
    name: phonestore_network
